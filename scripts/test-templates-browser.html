<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Templates API test (browser)</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    .url { font-family: monospace; font-size: 0.9rem; color: #333; margin: 0.5rem 0; }
    button { padding: 0.5rem 1rem; cursor: pointer; margin-right: 0.5rem; margin-bottom: 0.5rem; }
    .ok { color: #0a0; }
    .err { color: #c00; }
    pre { background: #f5f5f5; padding: 1rem; overflow: auto; font-size: 0.85rem; }
    ul { list-style: none; padding: 0; }
    li { padding: 0.35rem 0; border-bottom: 1px solid #eee; }
    #results { margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Templates API test (browser)</h1>
  <p>Uses the same backend URL as the app (current origin or configure below). Runs template list + detail checks and shows results.</p>
  <div class="url">Backend base: <input type="text" id="baseUrl" value="" placeholder="e.g. http://127.0.0.1:8000" style="width: 280px;" /></div>
  <p><button id="btnRun">Run tests</button></p>
  <div id="results"></div>

  <script>
    const baseInput = document.getElementById('baseUrl');
    const resultsEl = document.getElementById('results');
    const btnRun = document.getElementById('btnRun');

    function getBaseUrl() {
      const v = baseInput.value.trim();
      if (v) return v.replace(/\/$/, '');
      const origin = window.location.origin;
      if (origin.includes('localhost') || origin.includes('127.0.0.1')) return 'http://127.0.0.1:8000';
      return 'https://1nebackend-production.up.railway.app';
    }

    function log(msg, className = '') {
      const p = document.createElement('p');
      p.className = className;
      p.textContent = msg;
      resultsEl.appendChild(p);
    }

    function logList(items) {
      const ul = document.createElement('ul');
      items.forEach((item) => {
        const li = document.createElement('li');
        li.textContent = item;
        ul.appendChild(li);
      });
      resultsEl.appendChild(ul);
    }

    btnRun.addEventListener('click', async () => {
      resultsEl.innerHTML = '';
      const base = getBaseUrl();
      const apiBase = base + '/api';
      let passed = 0;
      let failed = 0;
      const templates = [];

      log(`Backend: ${base}`, 'url');
      log('');

      try {
        const healthRes = await fetch(base + '/health');
        if (!healthRes.ok) {
          log('✗ Health: ' + healthRes.status, 'err');
          failed++;
        } else {
          log('✓ Health: GET /health 200', 'ok');
          passed++;
        }
      } catch (e) {
        log('✗ Health: ' + e.message, 'err');
        failed++;
      }

      try {
        const listRes = await fetch(apiBase + '/v1/templates');
        const listData = await listRes.json();
        if (!listRes.ok) {
          log('✗ List templates: ' + listRes.status, 'err');
          failed++;
        } else if (!Array.isArray(listData)) {
          log('✗ List templates: response is not an array', 'err');
          failed++;
        } else {
          templates.push(...listData);
          log('✓ List templates: GET /api/v1/templates returned ' + templates.length + ' template(s)', 'ok');
          passed++;
        }
      } catch (e) {
        log('✗ List templates: ' + e.message, 'err');
        failed++;
      }

      if (templates.length > 0) {
        let detailOk = true;
        for (const t of templates) {
          try {
            const r = await fetch(apiBase + '/v1/templates/' + encodeURIComponent(t.slug));
            const d = await r.json();
            if (!r.ok || !d.latest_version || typeof d.latest_version.input_schema !== 'object') {
              detailOk = false;
              break;
            }
          } catch (_) {
            detailOk = false;
            break;
          }
        }
        if (detailOk) {
          log('✓ Detail: all ' + templates.length + ' templates have valid detail (slug, name, latest_version.input_schema)', 'ok');
          passed++;
        } else {
          log('✗ Detail: one or more templates failed detail check', 'err');
          failed++;
        }

        log('');
        log('Templates from backend (same data the frontend /templates page shows):');
        logList(templates.map((t, i) => (i + 1) + '. ' + (t.name || t.slug) + ' (' + t.slug + ')'));
        log('Total: ' + templates.length);
      }

      log('');
      log('Passed: ' + passed + ', Failed: ' + failed, failed ? 'err' : 'ok');
    });
  </script>
</body>
</html>
