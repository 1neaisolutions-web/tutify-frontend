<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          var persisted = localStorage.getItem('persist:root')
          if (!persisted) return
          var parsed = JSON.parse(persisted)
          var prefsRaw = parsed && parsed.preferences ? JSON.parse(parsed.preferences) : null
          var theme = (prefsRaw && prefsRaw.theme) || 'system'
          var isDark =
            theme === 'dark' ||
            (theme === 'system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (isDark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
    <title>Teacher Assistant - AI-Powered Teaching Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
